name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check dependency lockfile
        run: uv lock --check

      - name: Check repository hygiene
        run: uv run python scripts/dev/check_repository_hygiene.py

      - name: Run ruff
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src scripts

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run CLI smoke test
        run: uv run georeset-wiki-landcover-classify-articles --help

      - name: Run small reproducibility smoke test
        run: |
          uv run python scripts/reproduce_small.py \
            --output-dir build/reproducibility/small \
            --clean
          uv run python scripts/validate_artifacts.py \
            --root build/reproducibility/small \
            --profile small

      - name: Run tests
        env:
          PYTHONPATH: "src:."
        run: uv run pytest -q
